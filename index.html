    <style>
        /* Reset and base styles */
        * {
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
        }
        
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        
        /* Animations with vendor prefixes */
        @-webkit-keyframes spin {
            to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
        }
        @keyframes spin {
            to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
        }
        
        .animate-spin {
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        
        /* Line clamp with fallback */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-clamp: 2;
            max-height: 3em; /* Fallback for non-webkit browsers */
        }
        
        /* Touch-friendly buttons */
        button, .clickable {
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.1);
            touch-action: manipulation;
            cursor: pointer;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Textarea improvements for mobile */
        textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            resize: vertical;
        }
        
        /* Prevent text selection on buttons */
        button {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* Flexbox fallbacks */
        .flex-fallback {
            display: -webkit-box;
            display: -webkit-flex;
            display: -ms-flexbox;
            display: flex;
        }
        
        /* Grid fallback for older browsers */
        @supports not (display: grid) {
            .grid {
                display: block;
            }
            .lg\:col-span-2 {
                width: 100%;
            }
        }
        
        /* Mobile optimizations */
        @media (max-width: 640px) {
            body {
                font-size: 16px; /* Prevent zoom on iOS */
            }
            
            input, textarea, select {
                font-size: 16px; /* Prevent zoom on iOS */
            }
        }
        
        /* Print styles */
        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Header -->
    <header class="bg-blue-700 shadow-md border-b-2 border-blue-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-lg">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-bold text-white">Error Categorization Portal</h1>
                    <p class="text-sm text-blue-100 mt-1">AI-Powered Error Analysis & Classification (126 Categories)</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column - Input & Analysis -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Input Card -->
                <div class="bg-white rounded-lg shadow-md border border-gray-200 p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <h2 class="text-xl font-semibold text-gray-900">Enter Error Comment</h2>
                    </div>
                    
                    <textarea
                        id="errorComment"
                        placeholder="Paste or type the error comment here for analysis..."
                        class="w-full h-32 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none transition-all"
                    ></textarea>

                    <div class="flex items-center justify-between mt-4">
                        <div class="flex items-center gap-4">
                            <p class="text-sm text-gray-500">
                                <span id="charCount">0</span> characters
                            </p>
                            <button
                                id="clearBtn"
                                onclick="clearComment()"
                                class="flex items-center gap-1 px-3 py-1.5 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"
                            >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                                Clear
                            </button>
                        </div>
                        <button
                            id="analyzeBtn"
                            onclick="analyzeError()"
                            class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors font-medium shadow-sm"
                        >
                            <svg id="sendIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                            <svg id="loadingIcon" class="w-5 h-5 animate-spin hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span id="btnText">Analyze Error</span>
                        </button>
                    </div>
                </div>

                <!-- Result Card -->
                <div id="resultCard" class="bg-white rounded-lg shadow-md border border-gray-200 p-6 hidden">
                    <div id="resultContent"></div>
                </div>
            </div>

            <!-- Right Column - Info & History -->
            <div class="space-y-6">
                <!-- Stats Card -->
                <div class="bg-white rounded-lg shadow-md border border-gray-200 p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                        <h3 class="text-lg font-semibold text-gray-900">Statistics</h3>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 bg-blue-50 rounded-lg border border-blue-100">
                            <span class="text-sm text-gray-700 font-medium">Total Categories</span>
                            <span id="totalCategories" class="text-2xl font-bold text-blue-700">126</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-green-50 rounded-lg border border-green-100">
                            <span class="text-sm text-gray-700 font-medium">Analyses Today</span>
                            <span id="analysisCount" class="text-2xl font-bold text-green-700">0</span>
                        </div>
                    </div>
                </div>

                <!-- History Card -->
                <div class="bg-white rounded-lg shadow-md border border-gray-200 p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                        </svg>
                        <h3 class="text-lg font-semibold text-gray-900">Recent Analyses</h3>
                    </div>
                    
                    <div id="historyList" class="space-y-3">
                        <p class="text-sm text-gray-500 text-center py-8">No analyses yet</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="categories.js"></script>
    <script src="app.js"></script>
</body>
</html>
